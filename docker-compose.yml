services:
  db:
    image: postgres:16
    container_name: gymflow-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gymflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gymflow-api
    ports:
      - "5146:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=gymflow;Username=postgres;Password=postgres
      - Cors__AllowedOrigins__0=http://localhost:5173
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
