name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    # Sin servicio de Postgres: los tests usan mocks (Moq), no acceden a una DB real.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Backend — test
        working-directory: backend
        run: |
          dotnet restore
          dotnet build --no-restore
          dotnet test --no-build -v minimal
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend — build & test
        working-directory: frontend
        run: |
          npm ci
          npm run build
          npx vitest run

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Capturar imagen actual (para rollback)
        id: current
        run: |
          IMG=$(az containerapp show \
            --name ${{ vars.AZURE_ACA_APP }} \
            --resource-group ${{ vars.AZURE_RG }} \
            --query "properties.template.containers[0].image" -o tsv)
          echo "image=$IMG" >> "$GITHUB_OUTPUT"
          echo "Imagen actual (para rollback): $IMG"

      - name: Build & push image to ACR (tag con SHA + latest)
        run: |
          # Azure for Students no permite ACR Tasks (az acr build falla con
          # TasksOperationsNotAllowed), asi que construimos la imagen en el
          # runner y la pusheamos con docker. El Service Principal es Contributor
          # sobre el RG, rol que habilita push a ACR via 'az acr login'.
          az acr login --name ${{ vars.AZURE_ACR_NAME }}
          IMG_SHA=${{ vars.AZURE_ACR_LOGIN_SERVER }}/gymflow:${{ github.sha }}
          IMG_LATEST=${{ vars.AZURE_ACR_LOGIN_SERVER }}/gymflow:latest
          docker build -t "$IMG_SHA" -t "$IMG_LATEST" -f Dockerfile .
          docker push "$IMG_SHA"
          docker push "$IMG_LATEST"

      - name: Update Container App
        run: |
          az containerapp update \
            --name ${{ vars.AZURE_ACA_APP }} \
            --resource-group ${{ vars.AZURE_RG }} \
            --image ${{ vars.AZURE_ACR_LOGIN_SERVER }}/gymflow:${{ github.sha }}

      - name: Obtener URL publica
        id: app-url
        run: |
          URL=$(az containerapp show \
            --name ${{ vars.AZURE_ACA_APP }} \
            --resource-group ${{ vars.AZURE_RG }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "url=https://$URL" >> "$GITHUB_OUTPUT"
          echo "Deploy en: https://$URL"

      - name: Smoke test — esperar 200 OK
        run: |
          for i in {1..30}; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" ${{ steps.app-url.outputs.url }}/ || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "App responde 200 OK"
              exit 0
            fi
            echo "Intento $i/30 — status $STATUS, reintentando en 5s..."
            sleep 5
          done
          echo "App no respondio 200 despues de 30 intentos"
          exit 1

      - name: Rollback si el deploy/smoke fallo
        if: failure() && steps.current.outputs.image != ''
        run: |
          echo "Deploy fallido — revirtiendo a la imagen anterior: ${{ steps.current.outputs.image }}"
          az containerapp update \
            --name ${{ vars.AZURE_ACA_APP }} \
            --resource-group ${{ vars.AZURE_RG }} \
            --image ${{ steps.current.outputs.image }}
          echo "Rollback completado. La revision anterior vuelve a servir trafico."

      - name: Resumen
        if: always()
        run: |
          echo "## Deploy a Azure" >> $GITHUB_STEP_SUMMARY
          echo "- Imagen: \`gymflow:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- URL: ${{ steps.app-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
